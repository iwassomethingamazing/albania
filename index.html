<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Label with Albania Image and Background</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Black background for contrast */
        }

        /* Background container styling */
        .background-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Background animation placeholder */
        .background-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff0099, #493240);
            animation: move 5s infinite alternate;
            z-index: -1; /* Make sure it's behind the content */
        }

        /* Animation for the background */
        @keyframes move {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.2);
            }
        }

        /* Label container styling */
        .label-container {
            border: 5px solid #fff; /* Outer border */
            padding: 20px;
            width: 300px;
            text-align: center;
            position: relative;
            background: rgba(0, 0, 0, 0.5); /* Semi-transparent background for the label */
            z-index: 1;
        }

        .label-container img {
            width: 100px; /* Image width */
            position: absolute;
            top: -50px; /* Position the image above the label */
            left: 50%;
            transform: translateX(-50%);
        }

        .label-text {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px #f0f, 0 0 40px #f0f;
            margin-top: 60px; /* Space for the image */
        }
    </style>
</head>
<body>
    <div class="background-container">
        <div class="background-animation"></div>

        <div class="label-container">
            <!-- Add your image (Albania.png) here later -->
            <img src="albania.png" alt="Albania Flag">
            <div class="label-text">
                Welcome to Albania!
            </div>
        </div>
    </div>
</body>
</html>
